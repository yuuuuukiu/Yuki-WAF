# ============================================================
#  Yuki-WAF  — OpenResty / Nginx 主配置
# ============================================================

worker_processes auto;
error_log logs/error.log info;
pid       logs/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    # ---- 基础 ----
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    charset       utf-8;

    # ---- 日志格式（JSON，方便后续采集） ----
    log_format yuki_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"http_user_agent":"$http_user_agent",'
            '"http_referer":"$http_referer",'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log logs/access.log yuki_json;

    # ---- Lua 共享内存（用于限流 / 计数器） ----
    lua_shared_dict waf_counter   10m;
    lua_shared_dict waf_blacklist 5m;
    lua_shared_dict waf_config    2m;

    # ---- Lua 包路径 ----
    lua_package_path "/usr/local/openresty/lua/?.lua;;";

    # ---- 初始化阶段：加载全局配置 ----
    init_worker_by_lua_block {
        local ok, err = pcall(require, "gateway.phase_init")
        if not ok then
            ngx.log(ngx.ERR, "failed to load phase_init: ", err)
        end
    }

    # ============================================================
    #  上游：你的后端服务（反代目标）
    # ============================================================
    upstream backend {
        server host.docker.internal:8000;  # 宿主机的 FastAPI
        keepalive 32;
    }

    # ============================================================
    #  HTTP Server
    # ============================================================
    server {
        listen 80;
        server_name _;

        # ---- 健康检查 ----
        location /healthz {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ---- WAF 入口：所有请求先过 Lua 审计 ----
        location / {
            # 1. access 阶段：限流 + 黑名单
            access_by_lua_block {
                local ok, err = pcall(require, "gateway.phase_access")
                if not ok then
                    ngx.log(ngx.ERR, "access phase error: ", err)
                end
            }

            # 2. body_filter 阶段：把请求元数据投进 Kafka
            log_by_lua_block {
                local ok, err = pcall(require, "gateway.phase_log")
                if not ok then
                    ngx.log(ngx.ERR, "log phase error: ", err)
                end
            }

            # 3. 反代到后端
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
